<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkCapital Exporter</title>
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script>
      function drawShape(ctx, element, scale) {
        const x = element.x * scale;
        const y = element.y * scale;
        const width = element.width * scale;
        const height = element.height * scale;

        ctx.lineWidth = (element.strokeWidth || 2) * scale * 0.7;
        ctx.strokeStyle = element.strokeColor || '#222';
        ctx.fillStyle = element.backgroundColor || 'transparent';

        if (element.type === 'rectangle') {
          roundRect(ctx, x, y, width, height, 18 * scale);
          if (element.backgroundColor && element.backgroundColor !== 'transparent') {
            ctx.fill();
          }
          ctx.stroke();
        }

        if (element.type === 'ellipse') {
          ctx.beginPath();
          ctx.ellipse(x + width / 2, y + height / 2, width / 2, height / 2, 0, 0, Math.PI * 2);
          if (element.backgroundColor && element.backgroundColor !== 'transparent') {
            ctx.fill();
          }
          ctx.stroke();
        }
      }

      function drawText(ctx, element, scale) {
        const x = element.x * scale;
        const y = element.y * scale;
        const width = element.width * scale;
        const height = element.height * scale;
        const size = (element.fontSize || 24) * scale;

        ctx.fillStyle = element.strokeColor || '#222';
        ctx.font = `${size}px "Comic Sans MS", "Hiragino Kaku Gothic ProN", sans-serif`;
        ctx.textBaseline = 'middle';

        const lines = String(element.text || '').split('\n');
        lines.forEach((line, index) => {
          const ly = y + height / 2 + (index - (lines.length - 1) / 2) * (size * 1.3);
          let tx = x;
          if (element.textAlign === 'center') tx = x + width / 2;
          if (element.textAlign === 'right') tx = x + width;
          ctx.textAlign = element.textAlign || 'left';
          ctx.fillText(line, tx, ly, width);
        });
      }

      function roundRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      window.renderAndExport = async function renderAndExport(doc, scale) {
        const width = Math.round(doc.appState.width * scale);
        const height = Math.round(doc.appState.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = doc.appState.viewBackgroundColor || '#fff';
        ctx.fillRect(0, 0, width, height);

        const elements = Array.isArray(doc.elements) ? doc.elements : [];
        elements.filter((e) => e.type !== 'text').forEach((element) => drawShape(ctx, element, scale));
        elements.filter((e) => e.type === 'text').forEach((element) => drawText(ctx, element, scale));

        return canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, '');
      };
    </script>
  </body>
</html>
